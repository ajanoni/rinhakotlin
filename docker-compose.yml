services:
  api1: &api
    image: ajanoni/rinha-fraud-2026-kotlin:latest
    environment:
      - SOCK=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    healthcheck:
      test: ["CMD-SHELL", "test -S $$SOCK"]
      interval: 2s
      timeout: 1s
      retries: 90
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "170M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock

  lb:
    image: nginx:alpine
    restart: always
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "10M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs