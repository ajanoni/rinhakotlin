upstream apis {
    server unix:/run/sock/api1.sock;
    server unix:/run/sock/api2.sock;
    keepalive 64;
}

server {
    listen 9999;

    location / {
        proxy_pass                http://apis;
        proxy_http_version        1.1;
        proxy_set_header          Connection "";
        proxy_set_header          Host "";
        proxy_next_upstream_tries 1;
    }
}
